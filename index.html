<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mobile Checklist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <header>
      <h1>Daily Checklist</h1>
      <p>Touch each task to mark it done. It stays checked until the row expires.</p>
    </header>

    <section class="checklist" id="checklist"></section>

    <footer>
      <small>Persistent state saved locally in your browser.</small>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
