<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medoc Checklist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <header>
      <h1>Medoc Checklist</h1>
      <p>Touch each task to mark it done. The server saves timestamps and expiry data.</p>
      <div class="notif-toggle">
        <label for="notif-toggle-checkbox">Notifications</label>
        <input id="notif-toggle-checkbox" type="checkbox" />
      </div>
    </header>

    <section class="checklist" id="checklist"></section>

    <footer>
      <small>All data saved locally in your browser. Works offline!</small>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
